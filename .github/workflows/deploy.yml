name: Deploy storefront (VPS)

# main'e her push'ta otomatik deploy. NEXT_PUBLIC_* değerleri sunucudaki
# docker-compose.yml build-arg'larından (.env) gelir; build sunucuda yapılır.
on:
  push:
    branches: [main]
    paths-ignore:
      - 'README.md'
      - '.github/**'
  workflow_dispatch:

concurrency:
  group: deploy-storefront
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: SSH anahtarını hazırla
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "${{ secrets.DEPLOY_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Kodu sunucuya rsync'le
        run: |
          # rsync zaman zaman ssh bağlantı hatasıyla (exit 255) düşüyor → 4 deneme + artan backoff.
          n=0
          until rsync -az --delete \
            --exclude='.git' --exclude='.github' --exclude='node_modules' \
            --exclude='.next' --exclude='.env' --exclude='.env.*' \
            --exclude='coverage' --exclude='*.log' \
            -e "ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=no -o ConnectTimeout=20 -o ConnectionAttempts=3 -o ServerAliveInterval=15 -o ServerAliveCountMax=8" \
            ./ "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:/opt/deprem/deprem-market-storefront/"; do
            n=$((n+1)); [ $n -ge 4 ] && { echo "rsync 4 denemede de başarısız (ssh 255 flaky)"; exit 1; }
            echo "rsync denemesi $n başarısız, $((n*10))s sonra tekrar..."; sleep $((n*10))
          done

      - name: Build + restart
        run: |
          ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=no \
            -o ConnectTimeout=20 -o ConnectionAttempts=3 \
            -o ServerAliveInterval=30 -o ServerAliveCountMax=40 \
            "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}" bash -se <<'REMOTE'
          set -e
          exec 9>/tmp/deprem-deploy.lock; flock 9
          cd /opt/deprem/deploy
          # --no-deps: yalnız storefront build/start edilsin (depends_on backend'i build ETMESİN)
          docker compose build storefront
          docker compose up -d --no-deps storefront
          docker compose ps storefront
          REMOTE
